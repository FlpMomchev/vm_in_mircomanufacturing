# configs/split_presets.yaml
#
# Batch splitting presets for vm-split batch --preset <name>
#
# All paths are relative to the project root.
# band_hz: [low, high] in Hz  detection band for the IDLE/ACTIVE state machine.
# band_hz_fallbacks: optional list of fallback bands tried in order until the
#   expected segment count is matched or the closest candidate is selected.
# expected_map: stem  expected number of segments per recording.
#

airborne_normalBand:
  doe_xlsx:    "docs/doe/Design_of_Experiment.xlsx"
  doe_sheet:   "DOE_run_order"
  input_dir:   "data/raw_data/air_borne/normalBand"
  input_glob:  "*.flac"
  out_root:    "data/raw_data_extracted_splits/air"
  pre_pad_s:   0.20
  post_pad_s:  0.25
  band_hz:     [2000.0, 5000.0]
  expected_map:
    0303_1_4422:    45
