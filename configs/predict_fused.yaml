# configs/predict_fused.yaml
# One-shot fused inference on new raw (unsplit) recordings.

run:
  out_dir: "models/fusion/live_runs"
  state_json: "models/fusion/predict_fused_state.json"
  tag: "manual"

inputs:
  airborne:
    enabled: true
    raw_dir: "data/raw_data/air_borne"
    file_glob: "**/*.flac"
  structure:
    enabled: true
    raw_dir: "data/raw_data/structure_borne/OLD_DOE_inference"
    file_glob: "**/*.h5"

splitting:
  segments_root:
    airborne: "data/raw_data_extracted_splits/air/live"
    structure: "data/raw_data_extracted_splits/structure/live"

  # If no DOE manifest is provided, a dummy DOE is created with:
  # Step=1..expected_segments, HoleID=NA, Depth_mm=None.
  expected_segments:
    default: 25
    map_xlsx: "docs/doe/Design_of_Experiment.xlsx"
    doe_sheet: "DOE_run_order"

  common:
    pre_pad_s: 0.20
    post_pad_s: 0.25
    band_low_hz: 2000.0
    band_high_hz: 5000.0
    # Optional fallback detection bands tried in order if expected segment
    # count is not reached with the primary band.
    # band_fallbacks_hz:
    #   - [100.0, 5000.0]
    #   - [3500.0, 5000.0]
    band_fallbacks_hz: []

  airborne:
    export_format: "flac"  # auto|flac|wav
    target_sr: null

  structure:
    export_format: "h5"    # auto|h5|npz
    target_sr: null
    h5_data_key: "measurement/data"
    h5_time_key: "measurement/time_vector"

models:
  fusion:
    min_weight: 0.025

  airborne:
    classical:
      enabled: true
      bundle_path: "models/features/air/final_models_fast_top3/final_model/ensemble_model_bundle.joblib"
      fusion_mae_fallback: null
      snap_predictions: false   # null=bundle default, false=off, true=on
      snap_step_mm: null
    dl:
      enabled: true
      model_dir: "models/dl/air/reg/air_spec_resnet_reg_BEST_MODEL"
      fusion_mae_fallback: null
      device: "cuda"            # auto|cpu|cuda
      batch_size: null

  structure:
    classical:
      enabled: true
      bundle_path: "models/features/structure/final_models_fast/final_model/ensemble_model_bundle.joblib"
      fusion_mae_fallback: null
      snap_predictions: null
      snap_step_mm: null
    dl:
      enabled: true
      model_dir: "models/dl/structure/reg/structure_spec_resnet_reg_96k_retry"
      fusion_mae_fallback: null
      device: "cuda"
      batch_size: null
