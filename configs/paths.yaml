# configs/paths.yaml
#
# All paths are relative to the project root UNLESS they start with "/" or "~".
# Override any value on the CLI with --paths.<key>=<value>
#

# Raw recordings root (FLAC or HDF5 files, one recording per plate run)
raw_airborne_dir:       "data/raw_data/air_borne"
raw_structure_dir:      "data/raw_data/structure_borne"

# DOE manifest (Excel with sheet DOE_run_order)
doe_xlsx:               "docs/doe/Design_of_Experiment.xlsx"
doe_sheet:              "DOE_run_order"

# Segmented audio output root (produced by split_audio script)
segments_dir:           "data/raw_data_extracted_splits"

# Feature CSVs
features_airborne_csv:   "data/features/airborne/features.csv"
features_structure_csv:  "data/features/structure/features.csv"

# Model output roots
outputs_dl:             "models/dl"
outputs_features:       "models/features"
outputs_structure:      "models/features/structure"
outputs_fusion:         "models/fusion"

# Held-out / augmented data
unseen_dir:             "unseen"
inflated_dir:           "inflated"
