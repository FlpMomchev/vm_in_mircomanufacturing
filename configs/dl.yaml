# configs/dl.yaml
# Deep-learning training defaults.
# Any key can be overridden via CLI positional args: key=value

# Task / architecture
task: "classification"
feature_type: "logmel"
model_type: "hybrid_spec_transformer"

# Data scan
file_glob: null

# Audio windowing
sample_rate: 192000
window_sec: 0.50
window_hop_sec: 0.25

# Log-Mel STFT
n_fft: 8192
hop_length: 2048
n_mels: 128
fmin: 100.0
fmax: 40000.0

# Linear spectrogram frontend
linear_spec_fmin: 0.0
linear_spec_fmax: null

# Normalization control
peak_normalize: true

# CWT frontend
cwt_wavelet: "morl"
cwt_num_scales: 64
cwt_fmin: 200.0
cwt_fmax: 20000.0
cwt_precision: 10

# Training loop
batch_size: 32
epochs: 100
lr: 5.0e-4
weight_decay: 1.0e-4
patience: 15

# Data loading
num_workers: 4
prefetch_factor: 2
persistent_workers: true
pin_memory: true

# Reproducibility
seed: 42
min_windows_per_file: 1
max_windows_per_file_train: null

# Hardware
cache_audio: true
use_amp: false
device: "cuda"
channels_last: false
torch_compile: false

# Regression
rounding_step_mm: 0.1

# Model controls
backbone_embed_dim: 128
transformer_layers: 2
transformer_token_grid_size: 8
dropout: 0.20

# SpecAugment
specaugment_time_masks: 2
specaugment_time_width: 8
specaugment_freq_masks: 2
specaugment_freq_width: 12

# LR schedule and clipping
warmup_epochs: 5
lr_min: 1.0e-6
grad_clip: 1.0

# Diagnostics
save_training_plots: true
save_attention_maps: true
attention_examples: 4

# Split strategy
split_strategy: "stratified_random"
evaluation_unit: "file"
group_mode: "recording_root"
train_fraction: 0.75
val_fraction: 0.15
test_fraction: 0.10

# Experiment orchestration
n_repeats: 5
run_final_model: true
final_epochs: null
