# configs/airborne.yaml
# Combined airborne configuration:
# - classical: feature extraction settings
# - dl: deep-learning training settings

modality: "airborne"

classical:
  # Airborne acoustic feature extraction defaults.
  # Matches the validated logic in notebooks/extraction.py (192 kHz mic).

  # Runtime extraction target sample rate (Hz). If input SR differs, extractor resamples.
  target_sr: 192000

  # Microphone position on the plate (mm)
  mic_x_mm: -257.0
  mic_y_mm: -40.0

  # Band-power features
  band_power_bands:
    - [100, 1000]      # low
    - [1000, 5000]     # drill fundamental
    - [5000, 20000]    # mid-HF
    - [20000, 96000]   # ultrasonic

  # Machining-environment proxy downsampled rates
  machining_env_sr: 24000
  machining_hf_sr: 64000
  machining_hf_proxy: "roughness"   # "roughness" | "ae"

  # STFT
  stft_window: "hann"
  nperseg: 8192
  hop_length: 2048

  # DWT
  dwt_wavelet: "db8"
  dwt_max_level: 8
  dwt_padding_mode: "symmetric"

  # CWT
  cwt_wavelet: "morl"
  cwt_num_scales: 64
  cwt_fmin: 200.0
  cwt_fmax: 20000.0

  # Short-time statistics window
  short_time_frame_ms: 10.0
  short_time_hop_ms: 5.0

  # File glob for segmented audio
  file_glob: "**/*.flac"

  # Skip / trim signal edges (seconds)
  skip_start_s: 0.0
  skip_end_s: 0.0

  # Feature families to compute (all enabled by default)
  feature_families:
    time: true
    frequency: true
    band_power: true
    machining: true
    statistical: true
    short_time: true
    dwt: true
    cwt: true
    timefrequency: true

  # Parallelism
  n_workers: 6

dl:
  # Synced to deployed inference model:
  # models/dl/air/reg/air_spec_resnet_reg_BEST_MODEL/final_model/config.json
  # Task / architecture
  task: "regression"
  feature_type: "linear_spec"
  model_type: "spec_resnet"

  # Data scan
  file_glob: "**/*.flac"

  # Audio windowing
  sample_rate: 48000
  window_sec: 0.50
  window_hop_sec: 0.25

  # Log-Mel STFT
  n_fft: 2048
  hop_length: 512
  n_mels: 128
  fmin: 80.0
  fmax: 8100.0

  # Linear spectrogram frontend
  linear_spec_fmin: 80.0
  linear_spec_fmax: 8100.0

  # CWT frontend
  cwt_wavelet: "morl"
  cwt_num_scales: 64
  cwt_fmin: 200.0
  cwt_fmax: 20000.0
  cwt_precision: 10

  # Training loop
  batch_size: 32
  epochs: 80
  lr: 7.0e-4
  weight_decay: 1.0e-4
  patience: 12

  # Data loading
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true

  # Reproducibility
  seed: 42
  min_windows_per_file: 1
  max_windows_per_file_train: null

  # Hardware
  cache_audio: false
  use_amp: true
  device: "cuda"
  channels_last: true
  torch_compile: false

  # Regression
  rounding_step_mm: 0.1

  # Model controls
  backbone_embed_dim: 160
  transformer_layers: 2
  transformer_token_grid_size: 8
  dropout: 0.10

  # SpecAugment
  specaugment_time_masks: 0
  specaugment_time_width: 8
  specaugment_freq_masks: 0
  specaugment_freq_width: 12

  # LR schedule and clipping
  warmup_epochs: 3
  lr_min: 1.0e-5
  grad_clip: 1.0

  # Diagnostics
  save_training_plots: true
  save_attention_maps: true
  attention_examples: 4

  # Split strategy
  split_strategy: "stratified_random"
  evaluation_unit: "file"
  group_mode: "recording_root"
  train_fraction: 0.75
  val_fraction: 0.15
  test_fraction: 0.10

  # Experiment orchestration
  n_repeats: 5
  run_final_model: true
  final_epochs: null
