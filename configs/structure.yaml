# configs/structure.yaml
# Structure-borne acoustic feature extraction defaults.

modality: "structure"

# Geometry context (mm)
mic_x_mm: -257.0
mic_y_mm: -40.0

# Native sensor sample rate (Hz)
native_sr: 3125000

# Downsample factor applied via scipy.signal.decimate.
# 3_125_000 / 62.5 ~= 50 kHz.
ds_rate: 62.5

# HDF5 dataset keys
h5_data_key: "measurement/data"
h5_time_key: "measurement/time_vector"

# File selection
file_glob: "**/*.h5"

# Default extractor variant used by vm_micro.features.structure.extract_structure
# Valid values: "v1", "extensive"
extractor: "extensive"

# STFT parameters (at downsampled rate)
stft_window: "hann"
nperseg: 2048
hop_length: 512
short_time_frame_ms: 10.0

# CWT
cwt_wavelet: "morl"
cwt_num_scales: 64
cwt_fmin: 50.0
cwt_fmax: 1562.0

# DWT
dwt_wavelet: "sym8"
dwt_level: 5
dwt_padding_mode: "constant"

# Feature families (aligned with airborne naming)
feature_families:
  time: true
  frequency: true
  band_power: true
  machining: false
  statistical: true
  short_time: true
  dwt: true
  cwt: true
  timefrequency: true

# Parallelism
n_workers: 6
